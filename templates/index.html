<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Компания - Управление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .delete-btn, .edit-btn {
            padding: 5px 10px;
            margin: 0 3px;
            font-size: 12px;
        }

        .delete-btn {
            background: #e53e3e;
        }

        .delete-btn:hover {
            background: #c53030;
        }

        .edit-btn {
            background: #48bb78;
        }

        .edit-btn:hover {
            background: #38a169;
        }

        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }

        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 Управление IT Компанией</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('employees')">👥 Сотрудники</button>
            <button class="tab-btn" onclick="switchTab('projects')">📁 Проекты</button>
            <button class="tab-btn" onclick="switchTab('departments')">🏛️ Департаменты</button>
        </div>

        <div id="message" class="message"></div>

        <!-- Сотрудники -->
        <div id="employees-tab" class="tab-content active">
            <div class="card">
                <h2>➕ Добавить сотрудника</h2>
                <form id="employee-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" id="emp-first-name" required>
                        </div>
                        <div class="form-group">
                            <label>Фамилия</label>
                            <input type="text" id="emp-last-name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="emp-email" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Должность</label>
                            <input type="text" id="emp-position" required>
                        </div>
                        <div class="form-group">
                            <label>Зарплата</label>
                            <input type="number" id="emp-salary" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Департамент</label>
                        <select id="emp-department" required></select>
                    </div>
                    <button type="submit">Добавить сотрудника</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 Список сотрудников</h2>
                <div style="overflow-x: auto;">
                    <table id="employees-table">
                        <thead>
                            <tr><th>ID</th><th>Имя</th><th>Фамилия</th><th>Email</th><th>Должность</th><th>Зарплата</th><th>Департамент</th><th>Действия</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Проекты -->
        <div id="projects-tab" class="tab-content">
            <div class="card">
                <h2>➕ Добавить проект</h2>
                <form id="project-form">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="proj-name" required>
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="proj-description" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Статус</label>
                            <select id="proj-status" required>
                                <option value="Планируется">Планируется</option>
                                <option value="В работе">В работе</option>
                                <option value="Завершен">Завершен</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Бюджет</label>
                            <input type="number" id="proj-budget" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Клиент</label>
                        <input type="text" id="proj-client" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Дата начала</label>
                            <input type="date" id="proj-date-start">
                        </div>
                        <div class="form-group">
                            <label>Дата окончания</label>
                            <input type="date" id="proj-date-end">
                        </div>
                    </div>
                    <button type="submit">Добавить проект</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 Список проектов</h2>
                <div style="overflow-x: auto;">
                    <table id="projects-table">
                        <thead><tr><th>ID</th><th>Название</th><th>Описание</th><th>Статус</th><th>Бюджет</th><th>Клиент</th><th>Действия</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Департаменты -->
        <div id="departments-tab" class="tab-content">
            <div class="card">
                <h2>📋 Список департаментов</h2>
                <div style="overflow-x: auto;">
                    <table id="departments-table">
                        <thead><tr><th>ID</th><th>Название</th><th>Описание</th><th>Бюджет</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEditId = null;
        let currentEditType = null;

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        async function loadDepartments() {
            try {
                const response = await fetch('/api/departments');
                const data = await response.json();
                if (data.success) {
                    const select = document.getElementById('emp-department');
                    select.innerHTML = '<option value="">Выберите департамент</option>';
                    data.data.forEach(dept => {
                        select.innerHTML += `<option value="${dept.id}">${dept.name}</option>`;
                    });

                    // Заполнить таблицу департаментов
                    const tbody = document.querySelector('#departments-table tbody');
                    tbody.innerHTML = '';
                    data.data.forEach(dept => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${dept.id}</td>
                                <td>${dept.name}</td>
                                <td>${dept.description || '-'}</td>
                                <td>${dept.budget?.toLocaleString() || '-'}</td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                console.error('Ошибка загрузки департаментов:', error);
            }
        }

        async function loadEmployees() {
            try {
                const response = await fetch('/api/employees');
                const data = await response.json();
                if (data.success) {
                    const tbody = document.querySelector('#employees-table tbody');
                    tbody.innerHTML = '';
                    data.data.forEach(emp => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${emp.id}</td>
                                <td>${emp.first_name}</td>
                                <td>${emp.last_name}</td>
                                <td>${emp.email}</td>
                                <td>${emp.position}</td>
                                <td>${emp.salary?.toLocaleString()}</td>
                                <td>${emp.department_name}</td>
                                <td>
                                    <button class="edit-btn" onclick="editEmployee(${emp.id})">✏️</button>
                                    <button class="delete-btn" onclick="deleteEmployee(${emp.id})">🗑️</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                console.error('Ошибка загрузки сотрудников:', error);
            }
        }

        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');
                const data = await response.json();
                if (data.success) {
                    const tbody = document.querySelector('#projects-table tbody');
                    tbody.innerHTML = '';
                    data.data.forEach(proj => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${proj.id}</td>
                                <td>${proj.name}</td>
                                <td>${proj.description?.substring(0, 50) || '-'}</td>
                                <td>${proj.status}</td>
                                <td>${proj.budget?.toLocaleString()}</td>
                                <td>${proj.client || '-'}</td>
                                <td>
                                    <button class="edit-btn" onclick="editProject(${proj.id})">✏️</button>
                                    <button class="delete-btn" onclick="deleteProject(${proj.id})">🗑️</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                console.error('Ошибка загрузки проектов:', error);
            }
        }

        async function addEmployee(formData) {
            const response = await fetch('/api/employees', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.success) {
                showMessage('Сотрудник добавлен!', 'success');
                loadEmployees();
                document.getElementById('employee-form').reset();
            } else {
                showMessage('Ошибка: ' + result.error, 'error');
            }
        }

        async function addProject(formData) {
            const response = await fetch('/api/projects', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.success) {
                showMessage('Проект добавлен!', 'success');
                loadProjects();
                document.getElementById('project-form').reset();
            } else {
                showMessage('Ошибка: ' + result.error, 'error');
            }
        }

        async function deleteEmployee(id) {
            if (confirm('Удалить сотрудника?')) {
                const response = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    showMessage('Сотрудник удален!', 'success');
                    loadEmployees();
                } else {
                    showMessage('Ошибка: ' + result.error, 'error');
                }
            }
        }

        async function deleteProject(id) {
            if (confirm('Удалить проект? Это также удалит связанные задачи и назначения.')) {
                const response = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) {
                    showMessage('Проект удален!', 'success');
                    loadProjects();
                } else {
                    showMessage('Ошибка: ' + result.error, 'error');
                }
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        // Обработчики форм
        document.getElementById('employee-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('first_name', document.getElementById('emp-first-name').value);
            formData.append('last_name', document.getElementById('emp-last-name').value);
            formData.append('email', document.getElementById('emp-email').value);
            formData.append('position', document.getElementById('emp-position').value);
            formData.append('salary', document.getElementById('emp-salary').value);
            formData.append('department_id', document.getElementById('emp-department').value);
            addEmployee(formData);
        });

        document.getElementById('project-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('proj-name').value);
            formData.append('description', document.getElementById('proj-description').value);
            formData.append('status', document.getElementById('proj-status').value);
            formData.append('budget', document.getElementById('proj-budget').value);
            formData.append('client', document.getElementById('proj-client').value);
            formData.append('date_start', document.getElementById('proj-date-start').value);
            formData.append('date_end', document.getElementById('proj-date-end').value);
            addProject(formData);
        });

        // Инициализация
        loadDepartments();
        loadEmployees();
        loadProjects();
    </script>
</body>
</html>
